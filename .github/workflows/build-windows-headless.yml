name: Build RustDesk Windows Headless
 
on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
 
env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
 
# ─────────────────────────────────────────────────────────────
# JOB 1 : Générer le bridge Flutter/Rust (Ubuntu, plus rapide)
# ─────────────────────────────────────────────────────────────
jobs:
  generate-bridge:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
 
      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
 
      - name: Install bridge dependencies
        run: |
          cargo install flutter_rust_bridge_codegen --version "1.80.1" --locked
          sudo apt-get install -y libgtk-3-dev
 
      - name: Generate bridge files
        run: |
          cd flutter && flutter pub get && cd ..
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/bridge_generated.dart \
            --dart-decl-output flutter/lib/bridge_definitions.dart \
            --c-output flutter/macos/Runner/bridge_generated.h
        continue-on-error: true
 
      - name: Upload bridge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-files
          path: |
            flutter/lib/bridge_generated.dart
            flutter/lib/bridge_definitions.dart
            src/bridge_generated.rs
 
# ─────────────────────────────────────────────────────────────
# JOB 2 : Build Windows x64
# ─────────────────────────────────────────────────────────────
  build-windows-x64:
    needs: generate-bridge
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Download bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-files
          path: .
        continue-on-error: true
 
      - name: Export vcpkg cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
 
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt
 
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
 
      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
 
      - name: Enable Flutter Windows
        run: |
          flutter config --enable-windows-desktop
          flutter --version
 
      - name: Install LLVM
        run: |
          $llvm_url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-15.0.7/LLVM-15.0.7-win64.exe"
          Invoke-WebRequest -Uri $llvm_url -OutFile "LLVM.exe"
          Start-Process "LLVM.exe" -ArgumentList "/S" -Wait
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=C:\Program Files\LLVM\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
 
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg $env:USERPROFILE\vcpkg
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append
 
      - name: Install vcpkg dependencies
        run: |
          & "$env:USERPROFILE\vcpkg\vcpkg" install `
            --classic `
            libvpx:x64-windows-static `
            libyuv:x64-windows-static `
            opus:x64-windows-static `
            aom:x64-windows-static
        env:
          VCPKG_ROOT: ${{ env.USERPROFILE }}\vcpkg
 
      - name: Download patched Flutter engine
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip" `
            -OutFile "windows-x64-release.zip"
          Expand-Archive -Path "windows-x64-release.zip" -DestinationPath "windows-x64-release"
          $flutter_root = (Get-Command flutter).Source | Split-Path | Split-Path
          $cache = "$flutter_root\bin\cache\artifacts\engine\windows-x64-release"
          New-Item -ItemType Directory -Path $cache -Force | Out-Null
          Copy-Item "windows-x64-release\*" $cache -Force
        continue-on-error: true
 
      - name: Flutter pub get
        working-directory: flutter
        run: flutter pub get
 
      - name: Install Python deps
        run: pip install pywin32
 
      - name: Build with build.py
        run: python build.py --portable --flutter
        env:
          VCPKG_ROOT: ${{ env.USERPROFILE }}\vcpkg
          LIBCLANG_PATH: C:\Program Files\LLVM\bin
 
      - name: Package artifact
        run: |
          $paths = @(
            "flutter\build\windows\x64\runner\Release",
            "flutter\build\windows\runner\Release",
            "target\release"
          )
          $build = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($build) {
            Compress-Archive -Path "$build\*" -DestinationPath "rustdesk-headless-windows-x64.zip"
          } else {
            Write-Host "Recherche .exe:"
            Get-ChildItem -Recurse -Filter "*.exe" | Select-Object FullName
          }
        if: always()
 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-headless-windows-x64
          path: rustdesk-headless-windows-x64.zip
          retention-days: 30
        if: always()
 